<!DOCTYPE html>
<html class="dark" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DLG - Reactor Control Center (Admin)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#32CD32",
                        "secondary": "#FFFF00",
                        "background": "#0e0e0e",
                        "surface": "#0e0e0e",
                        "surface-container": "#1a1919"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .neon-glow-primary {
            text-shadow: 0 0 12px rgba(50, 205, 50, 0.8);
        }

        .glass-panel {
            background: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(12px);
        }

        .pixel-grid {
            background-image: radial-gradient(#32CD32 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-color: #0e0e0e;
        }
    </style>
</head>

<body class="bg-background text-white font-body pixel-grid min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-lg glass-panel p-8 rounded-2xl border border-primary/20 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
        
        <header class="text-center mb-8">
            <h1 class="font-headline text-3xl font-black tracking-tighter text-primary neon-glow-primary uppercase">
                Reactor Control
            </h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-secondary font-bold mt-2">Manual Override System</p>
        </header>

        <form id="admin-form" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-[10px] uppercase tracking-widest text-primary font-bold ml-1">Admin Secret Key</label>
                <input type="password" id="admin-key" required
                    class="w-full bg-surface-container border border-white/10 rounded-lg p-3 text-white focus:border-primary outline-none transition-all placeholder:text-white/20"
                    placeholder="Enter DLG_REACTOR_XXXX">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest text-white/50 font-bold ml-1">Donor Name</label>
                    <input type="text" id="donor-name" required
                        class="w-full bg-surface-container border border-white/10 rounded-lg p-3 text-white focus:border-primary outline-none transition-all"
                        placeholder="e.g. Jack">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest text-white/50 font-bold ml-1">Amount (VNĐ)</label>
                    <input type="number" id="donor-amount" required
                        class="w-full bg-surface-container border border-white/10 rounded-lg p-3 text-white focus:border-secondary outline-none transition-all"
                        placeholder="50000">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] uppercase tracking-widest text-white/50 font-bold ml-1">Message</label>
                <textarea id="donor-message" rows="2"
                    class="w-full bg-surface-container border border-white/10 rounded-lg p-3 text-white focus:border-primary outline-none transition-all resize-none"
                    placeholder="Gánh tạ tiếp đi bro!"></textarea>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-primary text-black font-headline font-bold py-4 rounded-lg uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-[0_0_20px_rgba(50,205,50,0.3)] flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">bolt</span>
                Broadcast to Reactor
            </button>
        </form>

        <div id="status-msg" class="mt-6 text-center text-sm font-bold uppercase tracking-widest hidden"></div>

        <footer class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] text-white/30 uppercase tracking-tighter">
            <span>&copy; 2024 DLG REACTOR</span>
            <a href="/" class="hover:text-primary transition-colors">Back to Dashboard</a>
        </footer>
    </div>

    <script>
        const form = document.getElementById('admin-form');
        const statusMsg = document.getElementById('status-msg');
        const adminKeyInput = document.getElementById('admin-key');

        // Load key from localStorage if exists
        const savedKey = localStorage.getItem('dlg_admin_key');
        if (savedKey) adminKeyInput.value = savedKey;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const data = {
                name: document.getElementById('donor-name').value.trim(),
                amount: parseInt(document.getElementById('donor-amount').value) || 0,
                message: document.getElementById('donor-message').value.trim()
            };
            const key = adminKeyInput.value.trim();

            if (!key) {
                statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
                statusMsg.textContent = 'ERROR: NHẬP ADMIN KEY TRƯỚC';
                statusMsg.classList.remove('hidden');
                return;
            }

            if (data.amount <= 0) {
                statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
                statusMsg.textContent = 'ERROR: SỐ TIỀN PHẢI > 0';
                statusMsg.classList.remove('hidden');
                return;
            }

            // Save key to localStorage
            localStorage.setItem('dlg_admin_key', key);

            statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-secondary animate-pulse';
            statusMsg.textContent = 'Initiating Broadcast...';
            statusMsg.classList.remove('hidden');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                const response = await fetch('/api/admin/add-donation', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-key': key
                    },
                    body: JSON.stringify(data)
                });

                // Read response as text first to avoid JSON parse errors
                const responseText = await response.text();
                
                if (response.ok) {
                    statusMsg.textContent = 'SUCCESS: REACTOR UPDATED!';
                    statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-primary';
                    // Clear form but keep the key
                    document.getElementById('donor-name').value = '';
                    document.getElementById('donor-amount').value = '';
                    document.getElementById('donor-message').value = '';
                } else if (response.status === 401) {
                    statusMsg.textContent = 'ERROR: SAI ADMIN KEY';
                    statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
                } else if (response.status === 404) {
                    statusMsg.textContent = 'ERROR: SERVER CHƯA CẬP NHẬT — HÃY RESTART SERVER';
                    statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
                } else {
                    // Try to parse error message from JSON
                    let errMsg = 'Unknown Error';
                    try { errMsg = JSON.parse(responseText).error || errMsg; } catch(e) {}
                    statusMsg.textContent = `ERROR: ${errMsg}`;
                    statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
                }
            } catch (err) {
                statusMsg.textContent = 'LỖI KẾT NỐI: KIỂM TRA SERVER ĐÃ CHẠY CHƯA';
                statusMsg.className = 'mt-6 text-center text-sm font-bold uppercase tracking-widest text-red-500';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                setTimeout(() => statusMsg.classList.add('hidden'), 5000);
            }
        });
    </script>
</body>

</html>
